{% comment %}
  Fragment do corpo do modal de estorno (TR-021).
  Params: estorno_form, requisicao
{% endcomment %}

<div class="space-y-4">
  <p class="text-sm text-slate-700">
    O estorno reverte toda a entregue líquida atual de volta ao saldo físico do estoque.
    Esta operação é irreversível e encerra definitivamente a requisição.
  </p>

  <div>
    <label for="modal-estornar-justificativa"
           class="block text-sm font-medium text-slate-900">
      Justificativa <span aria-hidden="true" class="text-red-600">*</span>
    </label>
    <textarea
      id="modal-estornar-justificativa"
      name="justificativa"
      rows="3"
      aria-required="true"
      autocomplete="off"
      class="mt-1 block w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm text-slate-900 shadow-sm focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500 focus-visible:ring-offset-1"
      placeholder="Motivo obrigatório do estorno"
    >{{ estorno_form.justificativa.value|default_if_none:"" }}</textarea>
  </div>
</div>
