<label for="modal-recusar-motivo" class="block text-sm font-medium text-slate-900">
  Motivo da recusa <span aria-hidden="true" class="text-red-600">*</span>
</label>
<p id="modal-recusar-hint" class="mt-1 text-xs text-slate-600">
  Obrigatório. A recusa encerra a requisição sem reservar ou baixar estoque.
</p>
<textarea
  id="modal-recusar-motivo"
  name="motivo"
  rows="4"
  required
  aria-required="true"
  aria-describedby="modal-recusar-hint{% if erro %} {{ id }}-erro{% endif %}"
  {% if erro %}aria-invalid="true"{% endif %}
  class="mt-3 block w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm text-slate-900 shadow-sm focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-red-500 focus-visible:ring-offset-1"
>{{ motivo_recusa|default_if_none:"" }}</textarea>
