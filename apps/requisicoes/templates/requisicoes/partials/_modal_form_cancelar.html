{% if cancelamento_requer_justificativa %}
  <label for="modal-cancelar-justificativa" class="block text-sm font-medium text-slate-900">
    Justificativa do cancelamento <span aria-hidden="true" class="text-red-600">*</span>
  </label>
  <p id="modal-cancelar-hint" class="mt-1 text-xs text-slate-600">
    Obrigatória para requisições autorizadas ou prontas para retirada.
  </p>
  <textarea
    id="modal-cancelar-justificativa"
    name="justificativa"
    rows="4"
    required
    aria-required="true"
    aria-describedby="modal-cancelar-hint{% if erro %} {{ id }}-erro{% endif %}"
    {% if erro %}aria-invalid="true"{% endif %}
    class="mt-3 block w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm text-slate-900 shadow-sm focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-red-500 focus-visible:ring-offset-1"
  >{{ justificativa_cancelamento|default_if_none:"" }}</textarea>
{% else %}
  <p class="rounded-lg border border-slate-200 bg-slate-50 px-3 py-2.5 text-sm text-slate-700">
    Confirme para continuar. Use <span class="font-semibold">Voltar</span> se quiser manter a requisição aberta.
  </p>
{% endif %}
