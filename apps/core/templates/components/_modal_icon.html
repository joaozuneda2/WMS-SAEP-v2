{% comment %}
  Ícone semântico para header de modal.
  Params: variant -> "info" | "warning" | "danger"
{% endcomment %}

{% if variant == "danger" %}
  <span aria-hidden="true" class="flex h-10 w-10 shrink-0 items-center justify-center rounded-full bg-red-100 text-red-700">
    <svg class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
      <path d="M8.5 3.5a1.5 1.5 0 0 1 3 0V4H15a1 1 0 1 1 0 2h-1.1l-.5 8.1A2.5 2.5 0 0 1 10.9 16H9.1a2.5 2.5 0 0 1-2.49-1.9L6.1 6H5a1 1 0 1 1 0-2h3.5v-.5Zm-1.35 8.7.25 4.05a.5.5 0 0 0 .5.48h2.7a.5.5 0 0 0 .5-.48l.25-4.05H7.15Z"/>
    </svg>
  </span>
{% elif variant == "warning" %}
  <span aria-hidden="true" class="flex h-10 w-10 shrink-0 items-center justify-center rounded-full bg-amber-100 text-amber-800">
    <svg class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
      <path fill-rule="evenodd" d="M8.485 2.495c.673-1.167 2.357-1.167 3.03 0l6.28 10.875c.673 1.167-.17 2.625-1.515 2.625H3.72c-1.347 0-2.189-1.458-1.515-2.625L8.485 2.495ZM10 6a.75.75 0 0 1 .75.75v3.5a.75.75 0 0 1-1.5 0v-3.5A.75.75 0 0 1 10 6Zm0 9a1 1 0 1 0 0-2 1 1 0 0 0 0 2Z" clip-rule="evenodd"/>
    </svg>
  </span>
{% else %}
  <span aria-hidden="true" class="flex h-10 w-10 shrink-0 items-center justify-center rounded-full bg-blue-100 text-blue-700">
    <svg class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
      <path fill-rule="evenodd" d="M18 10A8 8 0 1 1 2 10a8 8 0 0 1 16 0Zm-7-4a1 1 0 1 0-2 0v4a1 1 0 1 0 2 0V6Zm-1 8a1.2 1.2 0 1 1 0-2.4 1.2 1.2 0 0 1 0 2.4Z" clip-rule="evenodd"/>
    </svg>
  </span>
{% endif %}
