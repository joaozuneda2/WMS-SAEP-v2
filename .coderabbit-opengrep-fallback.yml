rules:
  - id: python-security-baseline
    patterns:
      - pattern-either:
          - pattern: eval(...)
          - pattern: exec(...)
    message: Eval/exec detectado — risco segurança
    languages: [python]
    severity: ERROR

  - id: sql-injection-risk
    patterns:
      - pattern-either:
          - pattern: cursor.execute($FORMAT, ...)
          - pattern: query = $X % ...
    message: Possível SQL injection — usar parameterização
    languages: [python]
    severity: WARNING

  - id: hardcoded-secrets
    patterns:
      - pattern-either:
          - pattern: password = "..."
          - pattern: secret = "..."
          - pattern: api_key = "..."
    message: Secret hardcoded — mover para env/config
    languages: [python]
    severity: ERROR
